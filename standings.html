<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a472a">
<title>Stone Harbor Golf — 2026 Season</title>
<style>
  :root {
    --green: #1a472a;
    --green-mid: #2d6a4f;
    --green-light: #e8f5e9;
    --green-accent: #52b788;
    --gold: #f4a228;
    --silver: #9e9e9e;
    --bronze: #cd7f32;
    --bg: #f5f5f0;
    --surface: #ffffff;
    --border: #e0e0d8;
    --text: #1a1a18;
    --text-muted: #666660;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--green); color: white; padding: 20px 20px 0; }
  .header-inner { max-width: 900px; margin: 0 auto; }
  .site-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .site-sub { font-size: 13px; opacity: 0.7; margin-top: 2px; }
  .header-meta { display: flex; gap: 20px; margin-top: 12px; padding-bottom: 16px; flex-wrap: wrap; }
  .meta-stat { font-size: 12px; opacity: 0.8; }
  .meta-val { font-weight: 600; }

  nav { background: var(--green); border-top: 1px solid rgba(255,255,255,0.1); }
  .nav-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .nav-calc { padding: 8px 16px; font-size: 13px; color: rgba(255,255,255,0.8); text-decoration: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; margin: 6px 16px; }
  .nav-calc:hover { background: rgba(255,255,255,0.1); color: white; }
  .nav-tab { padding: 10px 20px; font-size: 13px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav-tab.active { color: white; border-bottom-color: var(--gold); }

  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
  .card-header { padding: 12px 16px; background: var(--green-light); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.4px; display: flex; justify-content: space-between; align-items: center; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 8px 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.4px; cursor: pointer; white-space: nowrap; }
  th:hover { color: var(--green); }
  th.sorted { color: var(--green); }
  th.num, td.num { text-align: right; }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .rank { font-size: 12px; font-weight: 700; color: var(--text-muted); width: 32px; }
  .rank-1 { color: #b8860b; }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .player-name { font-weight: 600; font-size: 14px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-right: 8px; flex-shrink: 0; }
  .player-cell { display: flex; align-items: center; }
  .pos { color: #2e7d32; font-weight: 700; }
  .neg { color: #c0392b; }
  .neu { color: var(--text-muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .b-gold { background: #fff3cd; color: #856404; }
  .b-green { background: var(--green-light); color: var(--green); }
  .skin-icon { color: var(--green); font-weight: 700; }

  .round-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
  .round-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .round-header:hover { background: var(--bg); }
  .round-date { font-weight: 600; font-size: 14px; }
  .round-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .round-toggle { font-size: 18px; color: var(--text-muted); transition: transform 0.2s; }
  .round-toggle.open { transform: rotate(90deg); }
  .round-detail { display: none; border-top: 1px solid var(--border); }
  .round-detail.open { display: block; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  .season-banner { background: var(--green); color: white; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .season-year { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .season-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .season-stat { text-align: center; }
  .season-stat-val { font-size: 22px; font-weight: 700; }
  .season-stat-lbl { font-size: 11px; opacity: 0.7; margin-top: 1px; }

  .updated { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 8px; }
  .sort-arrow { display: inline-block; margin-left: 3px; opacity: 0.5; }
  .sorted .sort-arrow { opacity: 1; }

  @media (max-width: 600px) {
    th.hide-sm, td.hide-sm { display: none; }
    .season-stats { gap: 16px; }
    nav { overflow-x: auto; }
  }

  /* Avatar colors cycling */
  .av0{background:#EAF3DE;color:#27500A}.av1{background:#E6F1FB;color:#0C447C}
  .av2{background:#FAEEDA;color:#633806}.av3{background:#FAECE7;color:#712B13}
  .av4{background:#EEEDFE;color:#3C3489}.av5{background:#E1F5EE;color:#085041}
  .av6{background:#FBEAF0;color:#72243E}.av7{background:#F1EFE8;color:#444441}
  .av8{background:#EAF3DE;color:#173404}.av9{background:#FAEEDA;color:#412402}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">⛳ Stone Harbor Golf</div>
    <div class="site-sub">Season standings — updated after every round</div>
    <div class="header-meta" id="header-meta">
      <span class="meta-stat">Loading...</span>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <div style="display:flex">
      <button class="nav-tab active" onclick="showTab('standings',this)">Standings</button>
      <button class="nav-tab" onclick="showTab('skins',this)">Skins</button>
      <button class="nav-tab" onclick="showTab('rounds',this)">Rounds</button>
    </div>
    <a class="nav-calc" href="GolfBetCalculator.html">⛳ Calculator</a>
  </div>
</nav>

<main>
  <div class="panel active" id="panel-standings">
    <div class="season-banner" id="season-banner"></div>
    <div class="card">
      <div class="card-header">
        <span>Season leaderboard</span>
        <span id="sort-note" style="font-size:11px;font-weight:400;color:var(--text-muted)">Click column to sort</span>
      </div>
      <div id="standings-table"></div>
    </div>
    <div class="updated" id="last-updated"></div>
  </div>

  <div class="panel" id="panel-skins">
    <div class="card">
      <div class="card-header">Skins leaderboard</div>
      <div id="skins-table"></div>
    </div>
  </div>

  <div class="panel" id="panel-rounds">
    <div id="rounds-list"></div>
  </div>
</main>

<script>
var seasonData = null;
var sortCol = 'winnings';
var sortDir = -1;

function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('panel-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function fmt(n){ return '$' + Math.round(n).toLocaleString(); }
function sign(n){ return n>=0 ? '+$'+Math.round(n).toLocaleString() : '-$'+Math.abs(Math.round(n)).toLocaleString(); }
function initials(name){ return name.split(' ').map(function(p){return p[0];}).join('').toUpperCase().slice(0,2); }

function loadData() {
  fetch('season.json?v=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){ seasonData = data; render(); })
    .catch(function(){ showEmpty(); });
}

function showEmpty() {
  var empty = '<div class="empty-state"><div class="empty-icon">⛳</div><div class="empty-title">No season data yet</div><div class="empty-sub">Import a round using the Golf Bet Calculator app to get started.</div></div>';
  document.getElementById('standings-table').innerHTML = empty;
  document.getElementById('skins-table').innerHTML = empty;
  document.getElementById('rounds-list').innerHTML = empty;
  document.getElementById('season-banner').innerHTML = '<div><div class="season-year">2026</div><div style="opacity:0.7;font-size:13px">No rounds played yet</div></div>';
  document.getElementById('header-meta').innerHTML = '<span class="meta-stat">No data</span>';
}

function render() {
  if (!seasonData) return;
  var d = seasonData;
  var players = d.players || {};
  var rounds = d.rounds || [];
  var year = d.year || new Date().getFullYear();

  // Season banner
  var totalSkins = 0, totalWinnings = 0;
  Object.values(players).forEach(function(p){ totalSkins += p.skins||0; totalWinnings += p.winnings||0; });
  document.getElementById('season-banner').innerHTML =
    '<div><div class="season-year">'+year+'</div><div style="opacity:0.7;font-size:13px">Current season</div></div>' +
    '<div class="season-stats">' +
    '<div class="season-stat"><div class="season-stat-val">'+rounds.length+'</div><div class="season-stat-lbl">rounds</div></div>' +
    '<div class="season-stat"><div class="season-stat-val">'+Object.keys(players).length+'</div><div class="season-stat-lbl">golfers</div></div>' +
    '<div class="season-stat"><div class="season-stat-val">'+totalSkins+'</div><div class="season-stat-lbl">total skins</div></div>' +
    '</div>';

  // Header meta
  var lastRound = rounds.length ? rounds[rounds.length-1] : null;
  document.getElementById('header-meta').innerHTML =
    '<span class="meta-stat"><span class="meta-val">'+rounds.length+'</span> rounds played</span>' +
    '<span class="meta-stat"><span class="meta-val">'+Object.keys(players).length+'</span> golfers</span>' +
    (lastRound ? '<span class="meta-stat">Last played: <span class="meta-val">'+lastRound.date+'</span></span>' : '');

  renderStandings(players, rounds);
  renderSkins(players);
  renderRounds(rounds);

  if (d.updated) document.getElementById('last-updated').textContent = 'Last updated: ' + d.updated;
}

function renderStandings(players, rounds) {
  var list = Object.keys(players).map(function(name, i){
    var p = players[name];
    return { name: name, idx: i, winnings: p.winnings||0, skins: p.skins||0, rounds: p.rounds||0, net: (p.winnings||0)-(p.rounds||0)*40 };
  });

  list.sort(function(a,b){ return sortDir * (b[sortCol] - a[sortCol]); });

  var cols = [
    {key:'winnings', label:'Winnings', fmt:function(v){return fmt(v);}},
    {key:'skins',    label:'Skins',    fmt:function(v){return v;}},
    {key:'rounds',   label:'Rounds',   fmt:function(v){return v;}},
    {key:'net',      label:'Net',      fmt:function(v,row){
      var cls = v>0?'pos':v<0?'neg':'neu';
      return '<span class="'+cls+'">'+sign(v)+'</span>';
    }},
  ];

  var h = '<table><thead><tr>';
  h += '<th class="rank">#</th><th>Player</th>';
  cols.forEach(function(c){
    var isSorted = sortCol===c.key;
    h += '<th class="num'+(isSorted?' sorted':'')+'" onclick="sortBy(\''+c.key+'\')">'+c.label+
         '<span class="sort-arrow">'+(isSorted?(sortDir===-1?'↓':'↑'):'↕')+'</span></th>';
  });
  h += '</tr></thead><tbody>';

  list.forEach(function(p, i){
    var rank = i+1;
    var rankCls = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
    var avCls = 'av'+(p.idx%10);
    h += '<tr>';
    h += '<td class="rank '+rankCls+'">'+rank+'</td>';
    h += '<td><div class="player-cell"><div class="avatar '+avCls+'">'+initials(p.name)+'</div><span class="player-name">'+p.name+'</span></div></td>';
    cols.forEach(function(c){
      h += '<td class="num">'+c.fmt(p[c.key], p)+'</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('standings-table').innerHTML = h;
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  if (seasonData) renderStandings(seasonData.players, seasonData.rounds);
}

function renderSkins(players) {
  var list = Object.keys(players).map(function(name, i){
    var p = players[name];
    return { name: name, idx: i, skins: p.skins||0, rounds: p.rounds||0 };
  }).filter(function(p){ return p.skins > 0; });
  list.sort(function(a,b){ return b.skins - a.skins; });

  if (!list.length) {
    document.getElementById('skins-table').innerHTML = '<div class="empty-state"><div class="empty-icon">🏌️</div><div class="empty-title">No skins yet</div></div>';
    return;
  }

  var h = '<table><thead><tr><th class="rank">#</th><th>Player</th><th class="num">Skins</th><th class="num hide-sm">Rounds</th><th class="num hide-sm">Per round</th></tr></thead><tbody>';
  list.forEach(function(p, i){
    var perRound = p.rounds ? (p.skins/p.rounds).toFixed(1) : '—';
    var avCls = 'av'+(p.idx%10);
    h += '<tr>';
    h += '<td class="rank '+(i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'')+'">'+(i+1)+'</td>';
    h += '<td><div class="player-cell"><div class="avatar '+avCls+'">'+initials(p.name)+'</div><span class="player-name">'+p.name+'</span></div></td>';
    h += '<td class="num"><strong>'+p.skins+'</strong></td>';
    h += '<td class="num hide-sm">'+p.rounds+'</td>';
    h += '<td class="num hide-sm">'+perRound+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('skins-table').innerHTML = h;
}

function renderRounds(rounds) {
  if (!rounds.length) {
    document.getElementById('rounds-list').innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No rounds yet</div></div>';
    return;
  }
  var h = '';
  rounds.slice().reverse().forEach(function(round, i){
    h += '<div class="round-card">';
    h += '<div class="round-header" onclick="toggleRound('+i+')">';
    h += '<div><div class="round-date">'+round.date+'</div>';
    h += '<div class="round-meta">'+round.players+' players · '+(round.skins||0)+' skins · pot '+fmt(round.pot)+'</div></div>';
    h += '<span class="round-toggle" id="rt-'+i+'">›</span>';
    h += '</div>';
    h += '<div class="round-detail" id="rd-'+i+'">';
    if (round.results && round.results.length) {
      h += '<table style="font-size:13px"><thead><tr>';
      h += '<th>Player</th><th class="num">BB</th><th class="num">Skins</th><th class="num">Side</th><th class="num">Collects</th><th class="num">Net</th>';
      h += '</tr></thead><tbody>';
      round.results.forEach(function(r){
        var net = r.collects - r.entry;
        h += '<tr>';
        h += '<td style="font-weight:500">'+r.name+'</td>';
        h += '<td class="num">'+(r.bb?fmt(r.bb):'-')+'</td>';
        h += '<td class="num">'+(r.skins?fmt(r.skins):'-')+'</td>';
        h += '<td class="num">'+(r.side?fmt(r.side):'-')+'</td>';
        h += '<td class="num" style="font-weight:600">'+fmt(r.collects)+'</td>';
        h += '<td class="num"><span class="'+(net>=0?'pos':net<0?'neg':'neu')+'">'+sign(net)+'</span></td>';
        h += '</tr>';
      });
      h += '</tbody></table>';
    }
    h += '</div></div>';
  });
  document.getElementById('rounds-list').innerHTML = h;
}

function toggleRound(i) {
  var detail = document.getElementById('rd-'+i);
  var toggle = document.getElementById('rt-'+i);
  var open = detail.classList.toggle('open');
  toggle.classList.toggle('open', open);
}

loadData();
</script>
</body>
</html>
